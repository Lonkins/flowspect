name: flowspect
description: Static security analysis for visual agent-builder graphs. Scans flow exports and uploads SARIF to code scanning.
branding:
  icon: git-branch
  color: purple

inputs:
  paths:
    description: Space-separated files or directories to scan.
    required: false
    default: "."
  version:
    description: flowspect version spec to install (e.g. "==0.1.0"). Empty installs the latest.
    required: false
    default: ""
  rules:
    description: Optional extra rule file or directory.
    required: false
    default: ""
  fail-on:
    description: Minimum severity that fails the job (critical|high|medium|low).
    required: false
    default: "low"
  sarif-file:
    description: Path to write the SARIF report to.
    required: false
    default: "flowspect.sarif"
  upload-sarif:
    description: Upload the SARIF file to GitHub code scanning.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install flowspect
      shell: bash
      run: python -m pip install --quiet "flowspect${{ inputs.version }}"

    - name: Run flowspect
      id: scan
      shell: bash
      run: |
        RULES_ARG=""
        if [ -n "${{ inputs.rules }}" ]; then RULES_ARG="--rules ${{ inputs.rules }}"; fi
        set +e
        flowspect scan ${{ inputs.paths }} \
          --format sarif \
          --output "${{ inputs.sarif-file }}" \
          --fail-on "${{ inputs.fail-on }}" \
          $RULES_ARG
        echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        # Always print a human-readable table to the log as well.
        flowspect scan ${{ inputs.paths }} --fail-on "${{ inputs.fail-on }}" $RULES_ARG || true

    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' && always() }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.sarif-file }}
        category: flowspect

    - name: Enforce failure threshold
      shell: bash
      run: exit ${{ steps.scan.outputs.exit_code }}

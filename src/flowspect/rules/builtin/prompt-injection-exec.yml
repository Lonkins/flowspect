id: FS-INJECT-EXEC-001
kind: taint
severity: critical
title: Prompt injection to code execution
description: >
  Untrusted input flows into a node that executes code or shell commands with no
  validation in between. A prompt-injection or crafted payload can be turned into
  arbitrary execution.
remediation: >
  Never let untrusted text reach a code/shell node directly. Constrain the tool
  to a fixed command set, validate arguments against an allowlist, or add an
  output-validation guard before execution.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
source:
  capability: untrusted_input
sink:
  capability: code_execution
